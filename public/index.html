<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 24px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 16px; }
    header span { font-weight: 600; font-size: 15px; color: #fff; }
    #newChatBtn { background: none; border: 1px solid #333; border-radius: 6px; color: #777; font-size: 12px; padding: 4px 10px; cursor: pointer; height: auto; white-space: nowrap; }
    #newChatBtn:hover { border-color: #555; color: #aaa; background: none; }
    #dirInput {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 6px 10px;
      color: #aaa;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      max-width: 420px;
    }
    #dirInput:focus { border-color: #444; color: #e0e0e0; }
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg.assistant { border-color: #2a3a2a; }
    .msg.tool { border-color: #2a2a3a; color: #aaa; font-family: monospace; font-size: 13px; }
    .msg.error { border-color: #3a2a2a; color: #f88; }
    .msg.done { border-color: #222; color: #555; font-size: 12px; text-align: center; }
    .msg .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #555; margin-bottom: 6px; }
    footer {
      border-top: 1px solid #222;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 60px;
      max-height: 200px;
      outline: none;
    }
    textarea:focus { border-color: #555; }
    button {
      background: #2d6a4f;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      height: 42px;
      white-space: nowrap;
    }
    button:hover { background: #3a8a65; }
    button:disabled { background: #1a3a2a; color: #555; cursor: not-allowed; }
    #status { font-size: 12px; color: #555; padding: 4px 0; }
  </style>
</head>
<body>
  <header>
    <span>Claude Agent</span>
    <input id="dirInput" type="text" placeholder="Working directory (optional, e.g. ~/my-project)" />
    <button id="newChatBtn" onclick="newChat()">New Chat</button>
  </header>
  <div id="output"></div>
  <footer>
    <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
      <div id="status"></div>
      <textarea id="prompt" placeholder="Enter a task for Claude..." rows="2"></textarea>
    </div>
    <button id="runBtn" onclick="run()">Run</button>
  </footer>

  <script>
    const output = document.getElementById('output');
    const promptEl = document.getElementById('prompt');
    const runBtn = document.getElementById('runBtn');
    const status = document.getElementById('status');
    const dirInput = document.getElementById('dirInput');

    let sessionId = null;

    function newChat() {
      sessionId = null;
      output.innerHTML = '';
      status.textContent = '';
    }

    // Submit on Ctrl+Enter or Cmd+Enter
    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) run();
    });

    function addMsg(cls, label, text) {
      const existing = cls === 'assistant' && output.lastElementChild?.dataset.role === 'assistant';
      if (existing) {
        output.lastElementChild.querySelector('.body').textContent += text;
      } else {
        const div = document.createElement('div');
        div.className = `msg ${cls}`;
        div.dataset.role = cls;
        div.innerHTML = `<div class="label">${label}</div><div class="body">${escHtml(text)}</div>`;
        output.appendChild(div);
      }
      output.scrollTop = output.scrollHeight;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function run() {
      const prompt = promptEl.value.trim();
      if (!prompt || runBtn.disabled) return;

      promptEl.value = '';
      runBtn.disabled = true;
      status.textContent = 'Running...';

      // Show the user prompt
      addMsg('user', 'You', prompt);

      try {
        const res = await fetch('/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, directory: dirInput.value.trim() || undefined, session_id: sessionId || undefined }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              handleEvent(JSON.parse(line.slice(6)));
            } catch {}
          }
        }
      } catch (err) {
        addMsg('error', 'Error', err.message);
      } finally {
        runBtn.disabled = false;
        status.textContent = '';
      }
    }

    function handleEvent(evt) {
      if (evt.type === 'session') {
        sessionId = evt.session_id;
        return;
      }
      if (evt.type === 'assistant') {
        // Partial or full assistant message
        const content = evt.message?.content;
        if (!Array.isArray(content)) return;
        for (const block of content) {
          if (block.type === 'text') {
            addMsg('assistant', 'Claude', block.text);
          } else if (block.type === 'tool_use') {
            addMsg('tool', `Tool: ${block.name}`, JSON.stringify(block.input, null, 2));
          }
        }
      } else if (evt.type === 'tool_result') {
        const text = typeof evt.content === 'string'
          ? evt.content
          : JSON.stringify(evt.content, null, 2);
        addMsg('tool', 'Tool Result', text);
      } else if (evt.type === 'result') {
        status.textContent = `Cost: $${evt.cost_usd?.toFixed(4) ?? '?'}`;
      } else if (evt.type === 'stderr') {
        if (evt.text?.trim()) addMsg('error', 'Stderr', evt.text);
      } else if (evt.type === 'done') {
        // stream ended
      }
    }
  </script>
</body>
</html>
